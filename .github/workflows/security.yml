name: Security

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main, develop]

jobs:
  bandit:
    name: Bandit (static analysis)
    runs-on: ubuntu-latest

    env:
      FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip

      - name: Install bandit
        run: pip install "bandit>=1.7"

      - name: Run bandit
        run: bandit -r databricks_access_audit/ -c pyproject.toml

  pip-audit:
    name: pip-audit (dependency CVEs)
    runs-on: ubuntu-latest

    env:
      FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip

      - name: Install package and pip-audit
        run: pip install -e ".[sdk,dev]" "pip-audit>=2.7"

      - name: Audit dependencies
        # CVE-2026-25645 (requests): fix requires requests>=2.33.0 which dropped Python 3.9.
        # Ignored until we drop Python 3.9 support.
        run: pip-audit --ignore-vuln CVE-2026-25645
